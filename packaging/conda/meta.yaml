{% set name = "zerostack" %}
{% set version = "1.4.5" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/gi-dellav/zerostack/releases/download/v{{ version }}/zerostack-x86_64-unknown-linux-gnu.tar.gz  # [linux and x86_64]
    sha256: PLACEHOLDER
  - url: https://github.com/gi-dellav/zerostack/releases/download/v{{ version }}/zerostack-aarch64-unknown-linux-gnu.tar.gz  # [linux and aarch64]
    sha256: PLACEHOLDER
  - url: https://github.com/gi-dellav/zerostack/releases/download/v{{ version }}/zerostack-x86_64-apple-darwin.tar.gz  # [osx and x86_64]
    sha256: PLACEHOLDER
  - url: https://github.com/gi-dellav/zerostack/releases/download/v{{ version }}/zerostack-aarch64-apple-darwin.tar.gz  # [osx and arm64]
    sha256: PLACEHOLDER
  - url: https://raw.githubusercontent.com/gi-dellav/zerostack/v{{ version }}/LICENSE
    sha256: PLACEHOLDER

build:
  number: 0
  binary_relocation: false

requirements:
  build: []
  host: []
  run: []

test:
  commands:
    - zerostack --help
    - zerostack --version

about:
  home: https://github.com/gi-dellav/zerostack
  license: GPL-3.0-only
  license_file: LICENSE
  summary: Minimalistic coding agent written in Rust, optimized for memory footprint and performance

extra:
  recipe-maintainers:
    - gi-dellav
